<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Glow Beauty Boutique</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right,#ffdde1,#ee9ca7);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:450px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#d63384;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#d63384;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#b0256b;
        }

    </style>

</head>

<body>
<nav style="background:black;padding:15px;">

    <a href="/"
       style="color:white;
       margin-right:20px;
       text-decoration:none;
       font-size:18px;">
        Home
    </a>

    <a href="/bookings"
       style="color:white;
       margin-right:20px;
       text-decoration:none;
       font-size:18px;">
        View Bookings
    </a>

</nav>
<div
        style="
        display:flex;
        gap:20px;
        margin-bottom:20px;
"
>

    <div
            style="
            background:white;
            padding:20px;
            border-radius:10px;
            width:200px;
            text-align:center;
"
    >

        <h2>Total Bookings</h2>

        <h1
                th:text="${totalBookings}"
        ></h1>

    </div>

    <div
            style="
            background:white;
            padding:20px;
            border-radius:10px;
            width:200px;
            text-align:center;
"
    >

        <h2>Total Revenue</h2>

        <h1>

            ₹
            <span
                    th:text="${totalRevenue}"
            ></span>

        </h1>

    </div>

</div>

<div class="container">

    <h1>Glow Beauty Boutique</h1>

    <form action="/save" method="post">

        <input
                type="text"
                name="customerName"
                placeholder="Enter Customer Name"
        >

        <select name="service">

            <option>Bridal Makeup</option>

            <option>Party Makeup</option>

            <option>HD Makeup</option>

            <option>Hair Styling</option>

        </select>

        <input
                type="text"
                name="amount"
                placeholder="Enter Amount"
        >

        <button type="submit">

            Book Appointment

        </button>
        <h3 th:text="${message}"></h3>
        <br>

        <a href="/bookings">

            <button type="button">

                View All Bookings

            </button>

        </a>

    </form>


</div>

</body>

</html>
