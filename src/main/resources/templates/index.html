<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Glow Beauty Boutique</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
            135deg,
            #ffe0ec,
            #ffc2d1,
            #ffb3c6
            );

            padding:40px;

        }

        .navbar{

            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(10px);

            padding:18px 40px;

            border-radius:20px;

            margin-bottom:40px;

            box-shadow:0 8px 30px rgba(0,0,0,0.1);

        }

        .logo{

            font-size:28px;
            font-weight:700;
            color:#d63384;

        }

        .nav-links a{

            text-decoration:none;
            color:#333;
            margin-left:25px;
            font-size:17px;
            font-weight:500;
            transition:0.3s;

        }

        .nav-links a:hover{

            color:#d63384;

        }

        .main-container{

            display:flex;
            justify-content:center;
            align-items:flex-start;
            gap:40px;
            flex-wrap:wrap;

        }

        .stats{

            display:flex;
            flex-direction:column;
            gap:25px;

        }

        .card{

            width:250px;

            background:rgba(255,255,255,0.35);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.1);

            text-align:center;

        }

        .card h2{

            color:#444;
            margin-bottom:15px;

        }

        .card h1{

            color:#d63384;
            font-size:42px;

        }

        .container{

            width:500px;

            background:rgba(255,255,255,0.35);

            backdrop-filter:blur(15px);

            border-radius:30px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,0.1);

        }

        .container h1{

            text-align:center;
            margin-bottom:30px;
            color:#d63384;
            font-size:42px;

        }

        input,
        select{

            width:100%;
            padding:16px;

            margin-bottom:20px;

            border:none;

            border-radius:14px;

            background:white;

            font-size:16px;

            outline:none;

        }

        button{

            width:100%;
            padding:16px;

            border:none;

            border-radius:14px;

            background:#d63384;

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            margin-top:10px;

        }

        button:hover{

            background:#b0256b;
            transform:translateY(-2px);

        }

        .message{

            text-align:center;
            margin-top:20px;
            color:green;
            font-weight:600;

        }

        @media(max-width:900px){

            .main-container{

                flex-direction:column;
                align-items:center;

            }

            .stats{

                flex-direction:row;
                flex-wrap:wrap;
                justify-content:center;

            }

        }

    </style>

</head>

<body>

<div class="navbar">

    <div class="logo">
        Glow Beauty Boutique
    </div>

    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/bookings">Bookings</a>

    </div>

</div>

<div class="main-container">

    <div class="stats">

        <div class="card">

            <h2>Total Bookings</h2>

            <h1 th:text="${totalBookings}"></h1>

        </div>

        <div class="card">

            <h2>Total Revenue</h2>

            <h1>

                ₹
                <span th:text="${totalRevenue}"></span>

            </h1>

        </div>

    </div>

    <div class="container">

        <h1>Book Appointment</h1>

        <form action="/save" method="post">

            <input
                    type="text"
                    name="customerName"
                    placeholder="Enter Customer Name"
                    required
            >

            <select name="service" required>

                <option value="">
                    Select Service
                </option>

                <option>Bridal Makeup</option>

                <option>Party Makeup</option>

                <option>HD Makeup</option>

                <option>Hair Styling</option>

            </select>

            <input
                    type="text"
                    name="amount"
                    placeholder="Enter Amount"
                    min="1"
                    required
            >

            <a href="/login">

                <button type="button">

                    Book Appointment

                </button>

            </a>

            <a href="/bookings">

                <button type="button">

                    View All Bookings

                </button>

            </a>

            <div
                    class="message"
                    th:text="${message}">
            </div>

        </form>

    </div>

</div>

</body>

</html>
