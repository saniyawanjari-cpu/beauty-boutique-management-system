<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            background:
            linear-gradient(
            135deg,
            #ffe0ec,
            #ffc2d1,
            #ffb3c6
            );

            min-height:100vh;

            padding:30px;

        }

        .navbar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            background:white;

            padding:20px 40px;

            border-radius:20px;

            margin-bottom:30px;

            box-shadow:0 5px 20px rgba(0,0,0,0.1);

        }

        .navbar h1{

            color:#d63384;

        }

        .navbar a{

            text-decoration:none;

            background:#d63384;

            color:white;

            padding:12px 20px;

            border-radius:10px;

        }

        .cards{

            display:flex;

            gap:30px;

            flex-wrap:wrap;

            margin-bottom:40px;

        }

        .card{

            flex:1;

            min-width:250px;

            background:white;

            padding:30px;

            border-radius:25px;

            text-align:center;

            box-shadow:0 5px 20px rgba(0,0,0,0.1);

        }

        .card h2{

            color:#555;

            margin-bottom:15px;

        }

        .card h1{

            color:#d63384;

            font-size:42px;

        }

        .table-box{

            background:white;

            padding:30px;

            border-radius:25px;

            box-shadow:0 5px 20px rgba(0,0,0,0.1);

        }

        .table-box h2{

            margin-bottom:20px;

            color:#d63384;

        }

        table{

            width:100%;

            border-collapse:collapse;

        }

        th{

            background:#d63384;

            color:white;

            padding:15px;

        }

        td{

            padding:15px;

            text-align:center;

            border-bottom:1px solid #eee;

        }

        tr:hover{

            background:#fff0f5;

        }

    </style>

</head>

<body>

<div class="navbar">

    <h1>Glow Beauty Boutique Admin</h1>

    <a href="/">Home</a>

</div>

<div class="cards">

    <div class="card">

        <h2>Total Bookings</h2>

        <h1 th:text="${totalBookings}"></h1>

    </div>

    <div class="card">

        <h2>Total Revenue</h2>

        <h1>

            ₹
            <span th:text="${totalRevenue}"></span>

        </h1>

    </div>

</div>

<div class="table-box">

    <h2>Recent Bookings</h2>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Service</th>

            <th>Amount</th>

        </tr>

        <tr th:each="c : ${customers}">

            <td th:text="${c.id}"></td>

            <td th:text="${c.customerName}"></td>

            <td th:text="${c.service}"></td>

            <td th:text="${c.amount}"></td>

        </tr>

    </table>

</div>

</body>

</html>
